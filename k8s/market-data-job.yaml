apiVersion: batch/v1
kind: Job
metadata:
  name: market-data-ingestion-initial-run
  namespace: market-data
spec:
  template:
    spec:
      containers:
      - name: ingestion
        image: registry.iximiuz.com/market-data-ingestion:001
        env:
        - name: PYTHONPATH
          value: /app
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: market-data-secrets
              key: DATABASE_URL
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      restartPolicy: OnFailure