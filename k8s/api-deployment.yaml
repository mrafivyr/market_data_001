apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data-api
  namespace: market-data
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-data-api
  template:
    metadata:
      labels:
        app: market-data-api
    spec:
      containers:
      - name: api
        image: market-data-api:001
        ports:
        - containerPort: 8000
        env:
        - name: PYTHONPATH
          value: /app
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: market-data-secrets
              key: DATABASE_URL
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: market-data-api
  namespace: market-data
spec:
  selector:
    app: market-data-api
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP